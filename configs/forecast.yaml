defaults:
  - hydra: default
  - data: sqg
  - pre_pipeline: pre_normalize_q
  - post_pipeline: post_tendency_q
  - network: unet
  - forecast_module: flow_matching_forecast
  - _self_

dataloader:
  batch_size: 4
  num_workers: 0

# IO configuration
io:
  data_path: '${data.data_path}/test.zarr'  # Path to reference zarr store
  state_variables: ${data.state_variables} # Variables to load and write

  auxiliary_path: '${data.data_path}/test.zarr' #${data.auxiliary_path} # Path to auxiliary zarr store
  auxiliary_variables: [] #${data.auxiliary_variables} # Auxiliary variable names

  forcing_path: '${data.data_path}/test.zarr' # Path to forcing zarr store
  forcing_variables: [] #${data.forcing_variables} # Forcing variable names

  store_path:  'data/forecasts/${exp_name}/forecast.zarr' #'data/forecasts/${exp_name}/forecast.zarr'  # Output zarr path
  
  recreate_store: false  # Whether to overwrite existing store
  restart: false  # Whether to restart from existing store

# Dask configuration
dask:
  scheduler: null  # Dask scheduler address (None for local cluster)
  n_workers: ${num_workers}  # Number of workers for local cluster
  dashboard_address: null  # Dask dashboard address (None to disable)
  n_prefetch_init: 1  # Number of init state chunks to prefetch
  n_prefetch_forcing: 3  # Number of forcing chunks to prefetch

# Model checkpoint path
ckpt_path: "data/models/${exp_name}/best.ckpt" # Path to model checkpoint for forecasting (null to skip loading)
load_ema: false  # Load EMA network weights from training checkpoint

# Forecast initialization and lead time configuration
init_start: 0  # Forecast initialization start date
init_end: 10  # Forecast initialization end date
init_freq: 1  # Frequency of initialization times (e.g., '1D', '6h')
lead_time: 35  # Maximum lead time (e.g., '10D')
step_freq: 7  # Frequency of forecast steps (e.g., '6h')

# Note: n_in_steps + n_out_steps should be = data.n_steps
n_in_steps: 1 # Number of input steps for the model
n_out_steps: 1 # Number of output steps to forecast at each iteration

ensemble_size: 4 # Number of ensemble members to forecast

# Efficiency note:
# For short-term forecasting, n_out_steps should be lead_time / step_freq to write the full forecast in one step
# For long-term forecasting, n_out_steps should be around 1 month / step_freq to balance efficiency and memory usage
n_store_freq: 1 # Frequency of storing intermediate forecast results (in steps, e.g., store every n_store_freq steps)

# Hardware / precision configuration (mirrors trainer config)
trainer:
  accelerator: "cpu"  # 'cpu', 'gpu', 'mps'
  devices: 1          # int or list of ints
  precision: "32-true"  # '32-true', 'bf16-mixed', '16-mixed'
  strategy: "auto"  # Fabric strategy ('auto', 'ddp', etc.)

# Runtime configuration
seed: null  # Random seed for reproducibility

# Compilation
compile: false  # Set to true to enable torch.compile

# Logging
logging_level: INFO

# Experiment naming
exp_name: "${now:%Y-%m-%d}_${now:%H-%M-%S}"

# Overwrite network and pipeline configuration to use config groups
forecast_module:
  network: ${network}
  pre_pipeline: ${pre_pipeline}
  post_pipeline: ${post_pipeline}